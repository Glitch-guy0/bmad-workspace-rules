# DO NOT EDIT -- overwritten on every update.
#
# Agent customization surface for agent-archiver.
# Team overrides:     {project-root}/_bmad/custom/agent-archiver.toml
# Personal overrides: {project-root}/_bmad/custom/agent-archiver.user.toml

[agent]

# --- Metadata (install-time roster contract) ---
# Consumed by module.yaml:agents[] and `[agents.<code>]` in central config.

code = "archiver"
name = ""
title = "Documentation Workflow Orchestrator"
icon = "📋"
description = "Documentation workflow orchestrator that manages the paper trail from idea to implementation report."
agent_type = "autonomous"

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append

# Persistent facts loaded on every activation — keeps Archiver synced to the
# authoritative workspace rules. Overrides append.

persistent_facts = [
  "file:{skill-root}/references/workspace-rules.md",
]
